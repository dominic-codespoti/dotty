name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/instructions/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/instructions/**'

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_PATH: 'Dotty.sln'

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            rid: linux-x64
            build-native: true
          - os: windows-latest
            rid: win-x64
            build-native: false
          - os: macos-15-intel
            rid: osx-x64
            build-native: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ matrix.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ matrix.os }}-
            nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build native pty-helper (Unix only)
        if: matrix.build-native
        working-directory: src/Dotty.NativePty
        run: make

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} -c Release --no-restore

      - name: Run tests (with filtering)
        run: |
          # Run stable unit/integration test projects in CI.
          # E2E tests are excluded here because they are environment-sensitive
          # and have repeatedly stalled the hosted runners.
          projects=(
            tests/Dotty.Terminal.Tests/Dotty.Terminal.Tests.csproj
            tests/Dotty.NativePty.Tests/Dotty.NativePty.Tests.csproj
            tests/Dotty.Config.SourceGenerator.Tests/Dotty.Config.SourceGenerator.Tests.csproj
          )

          for project in "${projects[@]}"; do
            if [ "${{ matrix.os }}" = "windows-latest" ]; then
              if [ "$project" = "tests/Dotty.NativePty.Tests/Dotty.NativePty.Tests.csproj" ]; then
                echo "Skipping Windows NativePty tests in CI; current ConPTY test host crashes on hosted runners."
                continue
              fi

              dotnet test "$project" -c Release --filter "FullyQualifiedName!~Unix"
            else
              dotnet test "$project" -c Release
            fi
          done
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            src/Dotty.App/bin/Release/
            src/Dotty.NativePty/bin/
          retention-days: 5
          if-no-files-found: ignore

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: |
            **/TestResults/*.trx
            **/test-results.trx
          retention-days: 5
          if-no-files-found: ignore

  # Job to check code formatting and static analysis
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Check formatting
        run: |
          dotnet tool restore || true
          dotnet format --verify-no-changes --verbosity detailed ${{ env.SOLUTION_PATH }} || echo "Formatting check completed"
        continue-on-error: true

  # Job to run performance benchmarks
  performance-tests:
    name: Performance Tests (Linux)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-ubuntu-latest-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-ubuntu-latest-
            nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} -c Release --no-restore

      - name: Run Performance Tests
        run: |
          cd tests/Dotty.Performance.Tests
          dotnet run -c Release -- --mode quick
        env:
          CI: true
          DOTTY_BENCH_MODE: quick

      - name: Upload Performance Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results
          path: |
            tests/Dotty.Performance.Tests/BenchmarkDotNet.Artifacts/
            tests/Dotty.Performance.Tests/baselines.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Check for Performance Regressions
        run: |
          # Check if regressions were detected
          if [ -f "tests/Dotty.Performance.Tests/regressions.txt" ]; then
            echo "Performance regressions detected:"
            cat tests/Dotty.Performance.Tests/regressions.txt
            exit 1
          fi
          echo "No performance regressions detected."
        continue-on-error: true

  # Summary job that depends on all others
  ci-summary:
    name: CI Summary
    needs: [build-and-test, code-quality, performance-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-and-test.result }}" = "failure" ]; then
            echo "Build or tests failed!"
            exit 1
          fi
          
          if [ "${{ needs.code-quality.result }}" = "failure" ]; then
            echo "Code quality checks failed!"
            exit 1
          fi
          
          if [ "${{ needs.performance-tests.result }}" = "failure" ]; then
            echo "Performance tests failed!"
            echo "Check the performance-results artifact for details."
          fi
          
          echo "All CI checks passed!"
