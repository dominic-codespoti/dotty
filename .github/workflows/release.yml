name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'src/Dotty.App/Dotty.App.csproj'
  SOLUTION_PATH: 'Dotty.sln'

jobs:
  # Build for Linux x64
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-linux-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-linux-
            nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build native pty-helper
        working-directory: src/Dotty.NativePty
        run: make

      - name: Publish self-contained
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o ./publish/linux-x64

      - name: Copy pty-helper to output
        run: |
          cp src/Dotty.NativePty/bin/pty-helper ./publish/linux-x64/
          mv ./publish/linux-x64/Dotty.App ./publish/linux-x64/dotty
          chmod +x ./publish/linux-x64/pty-helper
          chmod +x ./publish/linux-x64/dotty

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd ./publish/linux-x64
          tar -czf "../../dotty-${VERSION}-linux-x64.tar.gz" \
            --transform 's,^,dotty-${VERSION}-linux-x64/,' \
            *
          cd ../..
          ls -la *.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotty-linux-x64
          path: dotty-*.tar.gz
          retention-days: 1

  # Build for macOS (Intel and Apple Silicon)
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            rid: osx-x64
            runner: macos-13
          - arch: arm64
            rid: osx-arm64
            runner: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-macos-${{ matrix.arch }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-macos-${{ matrix.arch }}-
            nuget-macos-
            nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build native pty-helper
        working-directory: src/Dotty.NativePty
        run: make

      - name: Publish self-contained
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o ./publish/${{ matrix.rid }}

      - name: Copy pty-helper to output
        run: |
          cp src/Dotty.NativePty/bin/pty-helper ./publish/${{ matrix.rid }}/
          mv ./publish/${{ matrix.rid }}/Dotty.App ./publish/${{ matrix.rid }}/dotty
          chmod +x ./publish/${{ matrix.rid }}/pty-helper
          chmod +x ./publish/${{ matrix.rid }}/dotty

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd ./publish/${{ matrix.rid }}
          tar -czf "../../dotty-${VERSION}-${{ matrix.rid }}.tar.gz" \
            --transform "s,^,dotty-${VERSION}-${{ matrix.rid }}/," \
            *
          cd ../..
          ls -la *.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotty-${{ matrix.rid }}
          path: dotty-*.tar.gz
          retention-days: 1

  # Build for Windows x64
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-windows-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-windows-
            nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Publish self-contained
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o .\publish\win-x64

      - name: Create zip archive
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          Compress-Archive -Path "publish\win-x64\*" -DestinationPath "dotty-$version-win-x64.zip" -Force
          Get-ChildItem *.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotty-win-x64
          path: dotty-*.zip
          retention-days: 1

  # Create GitHub Release
  create-release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: dotty-*

      - name: Collect artifacts
        run: |
          mkdir -p ./release-assets
          find ./artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} ./release-assets/ \;
          ls -la ./release-assets/

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          cat > RELEASE_NOTES.md << 'EOF'
          ## Dotty Terminal v${VERSION}

          ### Installation

          **Linux (x64):**
          ```bash
          tar -xzf dotty-${VERSION}-linux-x64.tar.gz
          cd dotty-${VERSION}-linux-x64
          ./dotty
          ```

          **macOS (Intel x64):**
          ```bash
          tar -xzf dotty-${VERSION}-osx-x64.tar.gz
          cd dotty-${VERSION}-osx-x64
          ./dotty
          ```

          **macOS (Apple Silicon):**
          ```bash
          tar -xzf dotty-${VERSION}-osx-arm64.tar.gz
          cd dotty-${VERSION}-osx-arm64
          ./dotty
          ```

          **Windows (x64):**
          1. Extract `dotty-${VERSION}-win-x64.zip`
          2. Run `Dotty.exe`

          ### System Requirements
          - Linux: kernel 3.10+, glibc 2.17+
          - macOS: 10.15+ (Catalina or later)
          - Windows: Windows 10 1809+ or Windows 11

          ### Checksums
          EOF
          
          # Generate checksums
          cd ./release-assets
          sha256sum * > ../CHECKSUMS.txt
          cat ../CHECKSUMS.txt >> ../RELEASE_NOTES.md
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Dotty v${{ steps.release_notes.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: ./release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksums as artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: CHECKSUMS.txt
          retention-days: 30
